disallowed-methods = [
    { path = "std::time::Instant::now", reason = "Use reifydb_runtime::context::clock::Clock::instant() instead" },
    { path = "std::time::SystemTime::now", reason = "Use reifydb_runtime::context::clock::Clock::now_*() instead" },
]

disallowed-types = [
    { path = "std::sync::Mutex", reason = "Use reifydb_runtime::sync::mutex::Mutex instead" },
    { path = "std::sync::RwLock", reason = "Use reifydb_runtime::sync::rwlock::RwLock instead" },
    { path = "parking_lot::Mutex", reason = "Use reifydb_runtime::sync::mutex::Mutex instead" },
    { path = "parking_lot::RwLock", reason = "Use reifydb_runtime::sync::rwlock::RwLock instead" },
    { path = "parking_lot::Condvar", reason = "Use reifydb_runtime::sync::condvar::Condvar instead" },
    { path = "std::time::Duration", reason = "Use reifydb_value::value::duration::Duration instead; std Duration is allowed only at irreducible boundaries (runtime timers/clock/condvar/mailbox, tokio, crossbeam, sqlite, external SDKs, FFI) - annotate those with #[allow(clippy::disallowed_types)]" },
]
