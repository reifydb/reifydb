[package]
name = "reifydb-client"
version.workspace = true
edition.workspace = true
authors.workspace = true
license = "Apache-2.0"
repository.workspace = true
description = "Official Rust client library for ReifyDB"

[[example]]
name = "http"
path = "examples/http.rs"
required-features = ["http"]

[[example]]
name = "websocket"
path = "examples/websocket.rs"
required-features = ["ws"]

[features]
default = []
dst = ["dep:reifydb-core", "dep:reifydb-runtime"]
grpc = ["dep:tonic", "dep:tonic-prost", "dep:prost", "dep:uuid", "dep:num-bigint"]
http = ["dep:reqwest"]
ws = ["dep:tokio-tungstenite", "dep:futures-util"]

[build-dependencies]
reifydb-build = { workspace = true }

[dependencies]
reifydb-type = { workspace = true }
reifydb-client-derive = { workspace = true }

# DST client
reifydb-core = { workspace = true, optional = true }
reifydb-runtime = { workspace = true, optional = true }

serde = { version = "1.0.219", features = ["derive"] }
serde_json = { version = "1.0.143" }

# Async runtime
tokio = { workspace = true }

# HTTP client
reqwest = { workspace = true, optional = true }

# WebSocket client
tokio-tungstenite = { workspace = true, optional = true }
futures-util = { workspace = true, optional = true }

# gRPC client
tonic = { workspace = true, optional = true }
tonic-prost = { workspace = true, optional = true }
prost = { workspace = true, optional = true }
uuid = { workspace = true, optional = true }
num-bigint = { workspace = true, optional = true }

[dev-dependencies]
reifydb = { workspace = true, features = ["sub_server_http", "sub_server_ws", "sub_server_grpc", "sub_flow"] }
reifydb-client = { path = ".", features = ["grpc", "http", "ws", "dst"] }
reifydb-sub-server = { workspace = true }
reifydb-sub-server-http = { workspace = true }
reifydb-sub-server-grpc = { workspace = true }
reifydb-sub-server-ws = { workspace = true }
reifydb-testing = { workspace = true }
test_each_file = { version = "0.3.5" }
tokio = { workspace = true }
