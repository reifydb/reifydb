[package]
name = "reifydb"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "A modern, real-time database with streaming and analytical capabilities"

[dependencies]
reifydb-abi = { workspace = true }
reifydb-allocator = { workspace = true }
reifydb-auth = { workspace = true }
reifydb-catalog = { workspace = true }
reifydb-cdc = { workspace = true }
reifydb-column = { workspace = true }
reifydb-codec = { workspace = true }
reifydb-core = { workspace = true }
reifydb-derive = { workspace = true }
reifydb-engine = { workspace = true }
reifydb-export = { workspace = true }
reifydb-extension = { workspace = true }
reifydb-macro = { workspace = true }
reifydb-metric = { workspace = true }
reifydb-policy = { workspace = true }
reifydb-profiler = { workspace = true }
reifydb-remote-proxy = { workspace = true }
reifydb-routine = { workspace = true }
reifydb-rql = { workspace = true }
reifydb-runtime = { workspace = true }
reifydb-sdk = { workspace = true }
reifydb-sqlite = { workspace = true }
reifydb-store-multi = { workspace = true }
reifydb-store-single = { workspace = true }
reifydb-sub-metric = { workspace = true }
reifydb-subscription = { workspace = true}
reifydb-transaction = { workspace = true }
reifydb-value = { workspace = true }

tracing = { workspace = true }
tracing-subscriber = { workspace = true, optional = true }
reifydb-sub-api = { workspace = true }
reifydb-sub-store = { workspace = true }
reifydb-sub-server-admin = { workspace = true, optional = true }
reifydb-sub-flow = { workspace = true, optional = true }
reifydb-sub-subscription = { workspace = true, optional = true }
reifydb-sub-task = { workspace = true }
reifydb-sub-tracing = { workspace = true, optional = true }
reifydb-sub-server = { workspace = true, optional = true }
reifydb-sub-server-grpc = { workspace = true, optional = true }
reifydb-sub-server-http = { workspace = true, optional = true }
reifydb-sub-server-otel = { workspace = true, optional = true }
reifydb-sub-raft = { workspace = true, optional = true }
reifydb-sub-server-ws = { workspace = true, optional = true }
reifydb-sub-replication = { workspace = true, optional = true }
reifydb-testing = { workspace = true, optional = true }

rayon = { workspace = true }
tokio = { workspace = true }
num_cpus = { workspace = true }
opentelemetry = { workspace = true, optional = true }
tracing-opentelemetry = { workspace = true, optional = true }

libc = { workspace = true }

[dev-dependencies]
reifydb-testing = { workspace = true }
test_each_file = { workspace = true }
bs58 = { workspace = true }
ed25519-dalek = { workspace = true }

[build-dependencies]
reifydb-build = { workspace = true }

[features]
default = []

# Allocator selection - forwards to the reifydb-allocator facade's backend gate.
alloc-jemalloc = ["reifydb-allocator/alloc-jemalloc"]

# Subsystem features
column = ["reifydb-sub-store/column"]
sub_flow = ["dep:reifydb-sub-flow", "dep:reifydb-sub-subscription"]
sub_tracing = ["dep:reifydb-sub-tracing"]
sub_metric_profiler = ["dep:tracing-subscriber"]
sub_server = ["dep:reifydb-sub-server", "reifydb-sub-metric/server"]
sub_server_admin = ["dep:reifydb-sub-server-admin", "sub_server"]
sub_server_grpc = ["dep:reifydb-sub-server-grpc", "sub_server"]
sub_server_http = ["dep:reifydb-sub-server-http", "sub_server"]
sub_server_otel = ["dep:reifydb-sub-server-otel", "dep:opentelemetry", "dep:tracing-opentelemetry", "sub_server"]
sub_raft = ["dep:reifydb-sub-raft"]
sub_server_ws = ["dep:reifydb-sub-server-ws", "sub_server"]
sub_replication = ["dep:reifydb-sub-replication"]
testing = ["dep:reifydb-testing"]
