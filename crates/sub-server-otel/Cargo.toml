[package]
name = "reifydb-sub-server-otel"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "OpenTelemetry/Jaeger tracing subsystem for ReifyDB"

[dependencies]
reifydb-core = { workspace = true }
reifydb-runtime = { workspace = true}
reifydb-value = { workspace = true }
reifydb-sub-api = { workspace = true }

# Tracing ecosystem
tracing = { workspace = true }

# OpenTelemetry core
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true }

# OpenTelemetry exporters (feature-gated)
opentelemetry-otlp = { workspace = true, optional = true }

# Async runtime
tokio = { workspace = true }

[build-dependencies]
reifydb-build = { workspace = true }

[features]
default = ["otlp"]
otlp = ["dep:opentelemetry-otlp"]
