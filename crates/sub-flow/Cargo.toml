[package]
name = "reifydb-sub-flow"
authors.workspace = true
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Flow subsystem for stream processing and data flows"

[features]
default = []

[build-dependencies]
reifydb-build = { workspace = true }

[dependencies]
reifydb-cdc = { workspace = true }
reifydb-core = { workspace = true }
reifydb-catalog = { workspace = true }
reifydb-engine = { workspace = true }
reifydb-extension = { workspace = true }
reifydb-routine = { workspace = true }
reifydb-abi = { workspace = true }
reifydb-runtime = { workspace = true }
reifydb-sdk = { workspace = true }
reifydb-rql = { workspace = true }
reifydb-store-multi = { workspace = true }
reifydb-store-single = { workspace = true }
reifydb-sub-api = { workspace = true }
reifydb-transaction = { workspace = true }
reifydb-type = { workspace = true }

serde = { workspace = true }
serde_bytes = { workspace = true }
postcard = { workspace = true }
smallvec = { workspace = true }
crossbeam-channel = { workspace = true }

rayon = { workspace = true }
dashmap = { workspace = true }
indexmap = { workspace = true }
num_cpus = { workspace = true }
tracing = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
libloading = { workspace = true }

[[bench]]
name = "marshal_input_borrow"
harness = false
path = "benches/ffi_zero_copy/marshal_input_borrow.rs"

[[bench]]
name = "ffi_filter"
harness = false
path = "benches/ffi_zero_copy/ffi_filter.rs"

[[bench]]
name = "ffi_aggregate_flush"
harness = false
path = "benches/ffi_zero_copy/ffi_aggregate_flush.rs"

[[bench]]
name = "distinct_warm_cache"
harness = false
path = "benches/ffi_zero_copy/distinct_warm_cache.rs"

[dev-dependencies]
reifydb-sdk = { workspace = true }
reifydb-core = { workspace = true }
reifydb-type = { workspace = true }
reifydb-abi = { workspace = true }
