[package]
name = "reifydb-sdk"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "SDK for building ReifyDB operators, procedures, transforms and more"

[build-dependencies]
reifydb-build = { workspace = true }

[dependencies]
bumpalo.workspace = true
reifydb-abi.workspace = true
reifydb-core.workspace = true
reifydb-runtime.workspace = true
reifydb-value.workspace = true
postcard.workspace = true
rand.workspace = true
serde.workspace = true
tracing.workspace = true
uuid.workspace = true

[features]
default = []
test-support = []
chaos = []

[dev-dependencies]
reifydb-testing = { workspace = true }

[[test]]
name = "ffi"
path = "tests/ffi.rs"

[[test]]
name = "chaos"
path = "tests/chaos.rs"

[[test]]
name = "operator"
path = "tests/operator.rs"


