syntax = "proto3";
package reifydb.v1;

service ReifyDB {
  rpc Admin(AdminRequest) returns (AdminResponse);
  rpc Command(CommandRequest) returns (CommandResponse);
  rpc Query(QueryRequest) returns (QueryResponse);
  rpc Subscribe(SubscribeRequest) returns (stream SubscriptionEvent);
  rpc Unsubscribe(UnsubscribeRequest) returns (UnsubscribeResponse);
  rpc BatchSubscribe(BatchSubscribeRequest) returns (stream BatchSubscriptionEvent);
  rpc BatchUnsubscribe(BatchUnsubscribeRequest) returns (BatchUnsubscribeResponse);
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc Call(OperationRequest) returns (OperationResponse);
}

// Every response payload is an RBCF message (the canonical binary columnar
// format from the reifydb-codec crate). Params carry values in the canonical
// self-describing value encoding from the same crate.

message AdminRequest  { string rql = 1; optional Params params = 2; }
message AdminResponse { bytes rbcf = 1; }
message CommandRequest  { string rql = 1; optional Params params = 2; }
message CommandResponse { bytes rbcf = 1; }
message QueryRequest  { string rql = 1; optional Params params = 2; }
message QueryResponse { bytes rbcf = 1; }

// Call a bound procedure via its gRPC binding name (globally unique across `system::bindings::grpc`).
message OperationRequest  { string name = 1; optional Params params = 2; }
message OperationResponse { bytes rbcf = 1; }

message SubscribeRequest { string rql = 1; }
message UnsubscribeRequest { string subscription_id = 1; }
message UnsubscribeResponse { string subscription_id = 1; }
message SubscriptionEvent {
  oneof event {
    SubscribedEvent subscribed = 1;
    ChangeEvent change = 2;
  }
}
message SubscribedEvent { string subscription_id = 1; }
message ChangeEvent { bytes rbcf = 1; }

// BatchSubscribe opens a single stream that delivers coalesced deltas from N RQL queries.
// Each poller tick emits one BatchChangeEvent containing an entry per member that had data.
message BatchSubscribeRequest {
  repeated string rql = 1;
}
message BatchUnsubscribeRequest { string batch_id = 1; }
message BatchUnsubscribeResponse { string batch_id = 1; }
message BatchSubscriptionEvent {
  oneof event {
    BatchSubscribedEvent subscribed = 1;
    BatchChangeEvent change = 2;
    BatchMemberClosedEvent member_closed = 3;
  }
}
message BatchSubscribedEvent {
  string batch_id = 1;
  repeated BatchMember members = 2;
}
message BatchMember {
  uint32 index = 1;
  string subscription_id = 2;
}
message BatchChangeEvent {
  string batch_id = 1;
  repeated BatchChangeEntry entries = 2;
}
message BatchChangeEntry {
  string subscription_id = 1;
  ChangeEvent change = 2;
}
message BatchMemberClosedEvent {
  string batch_id = 1;
  string subscription_id = 2;
}

message AuthenticateRequest {
  string method = 1;
  map<string, string> credentials = 2;
}
message AuthenticateResponse {
  string status = 1;
  string token = 2;
  string identity = 3;
  string reason = 4;
}

message LogoutRequest {}
message LogoutResponse {
  string status = 1;
}

message Params {
  oneof params { PositionalParams positional = 1; NamedParams named = 2; }
}
message PositionalParams { repeated TypedValue values = 1; }
message NamedParams      { map<string, TypedValue> values = 1; }
message TypedValue       { bytes encoded = 1; }
