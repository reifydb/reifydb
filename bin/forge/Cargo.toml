[package]
name = "forge"
version.workspace = true
edition.workspace = true
publish = false

[[bin]]
name = "reifydb-forge"
path = "src/main.rs"

[dependencies]
reifydb = { path = "../../pkg/rust/reifydb", features = [
    "sub_server_admin",
    "sub_server_grpc",
    "sub_server_ws",
    "sub_tracing",
] }
reifydb-catalog = { workspace = true }
reifydb-core = { workspace = true }
reifydb-type = { workspace = true }
reifydb-engine = { workspace = true }
reifydb-transaction = { workspace = true }
reifydb-client = { workspace = true, features = ["grpc"] }
clap = { version = "4", features = ["derive"] }
tokio = { workspace = true }
axum = { workspace = true }
tower-http = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
uuid = { workspace = true }
